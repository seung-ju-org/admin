pipeline:
  agent:
    kubernetes:
      yamlFile: "ci/jenkins-agent.yaml"
      defaultContainer: "node"

  options:
    - "timestamps()"
    - "disableConcurrentBuilds()"
    - "buildDiscarder(logRotator(numToKeepStr: '20'))"

  environment:
    IMAGE_REGISTRY: "ghcr.io"
    IMAGE_REPOSITORY: "ghcr.io/seung-ju/admin"
    HELM_VALUES_FILE: "helm/admin/values.yaml"
    GIT_USER_NAME: "Jenkins"
    GIT_USER_EMAIL: "no-reply@jenkins.seung-ju.com"

  stages:
    - stage: "Checkout"
      steps:
        - "checkout scm"

    - stage: "Install"
      steps:
        - "sh 'corepack enable'"
        - "sh 'pnpm --version'"
        - "sh 'pnpm install --frozen-lockfile'"

    - stage: "Verify"
      steps:
        - "sh 'pnpm -s tsc --noEmit'"
        - "sh 'pnpm -s lint'"

    - stage: "Build"
      steps:
        - "withCredentials([string(credentialsId: 'sentry-auth-token', variable: 'SENTRY_AUTH_TOKEN')]) { sh 'pnpm build' }"

    - stage: "Docker Build & Push"
      when:
        branch: "main"
      steps:
        - "withCredentials([string(credentialsId: 'sentry-auth-token', variable: 'SENTRY_AUTH_TOKEN')]) { container('docker') { sh '''\n            TAG=${BUILD_NUMBER}-${GIT_COMMIT:0:8}\n            echo $TAG > .image_tag\n            echo \"Building ${IMAGE_REPOSITORY}:${TAG}\"\n            docker build \\\n              --build-arg SENTRY_AUTH_TOKEN=\"${SENTRY_AUTH_TOKEN}\" \\\n              -t ${IMAGE_REPOSITORY}:${TAG} .\n          ''' } }"
        - "withCredentials([usernamePassword(credentialsId: 'ghcr-credentials', usernameVariable: 'REG_USER', passwordVariable: 'REG_PASS')]) { container('docker') { sh '''\n            TAG=$(cat .image_tag)\n            echo \"$REG_PASS\" | docker login ${IMAGE_REGISTRY} -u \"$REG_USER\" --password-stdin\n            docker push ${IMAGE_REPOSITORY}:${TAG}\n          ''' } }"

    - stage: "Update Helm Tag For ArgoCD"
      when:
        branch: "main"
      steps:
        - "withCredentials([usernamePassword(credentialsId: 'git-push-credentials', usernameVariable: 'GIT_USER', passwordVariable: 'GIT_TOKEN')]) { sh '''\n            TAG=$(cat .image_tag)\n            git config user.name \"${GIT_USER_NAME}\"\n            git config user.email \"${GIT_USER_EMAIL}\"\n\n            sed -i -E \"s|(^[[:space:]]*tag:[[:space:]]*).*$|\\1${TAG}|\" ${HELM_VALUES_FILE}\n\n            if git diff --quiet -- ${HELM_VALUES_FILE}; then\n              echo \"No changes in ${HELM_VALUES_FILE}\"\n              exit 0\n            fi\n\n            git add ${HELM_VALUES_FILE}\n            git commit -m \"ci: update admin image tag to ${TAG}\"\n\n            REMOTE_URL=$(git remote get-url origin)\n            REMOTE_URL=${REMOTE_URL#https://}\n            git push \"https://${GIT_USER}:${GIT_TOKEN}@${REMOTE_URL}\" HEAD:${BRANCH_NAME}\n          ''' }"

  post:
    always:
      - "cleanWs()"
