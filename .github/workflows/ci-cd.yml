name: CI/CD

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]

permissions:
  contents: write
  packages: write

env:
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/admin

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm -s prisma generate

      - name: Type check
        run: pnpm -s tsc --noEmit

      - name: Lint
        run: pnpm -s lint

      - name: Test
        run: pnpm -s test

      - name: Build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm -s build

  build-and-release:
    if: github.event_name == 'push' && github.ref_name == 'main' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Prepare image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          TAG="${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.vars.outputs.tag }}
          build-args: |
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Update Helm image tag
        run: |
          TAG='${{ steps.vars.outputs.tag }}'
          sed -i -E "s|(^[[:space:]]*tag:[[:space:]]*).*$|\\1${TAG}|" helm/admin/values.yaml

          if git diff --quiet -- helm/admin/values.yaml; then
            echo "No changes in helm/admin/values.yaml"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/admin/values.yaml
          git commit -m "ci: update admin image tag to ${TAG} [skip ci]"
          git push
