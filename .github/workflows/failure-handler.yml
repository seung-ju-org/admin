name: Failure Handler

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write

jobs:
  handle-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Summarize failed jobs
        id: summary
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const { owner, repo } = context.repo;

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner,
              repo,
              run_id: run.id,
              per_page: 100,
            });

            const failed = jobs.filter((job) => job.conclusion === "failure");
            const lines = failed.length
              ? failed.map((job) => `- ${job.name}`)
              : ["- (failed job details unavailable)"];

            const pr = run.pull_requests?.[0];
            const branch = run.head_branch ?? "unknown";
            const sha = (run.head_sha ?? "").slice(0, 8);

            const title = `[CI Failure] ${branch} @ ${sha}`;
            const body = [
              `CI/CD workflow run failed.`,
              ``,
              `- Workflow: ${run.name}`,
              `- Conclusion: ${run.conclusion}`,
              `- Branch: \`${branch}\``,
              `- Commit: \`${run.head_sha}\``,
              `- Trigger: ${run.event}`,
              `- Run URL: ${run.html_url}`,
              ``,
              `## Failed jobs`,
              ...lines,
              ``,
              `## Next actions`,
              `1. Open the run URL and inspect the failed job logs.`,
              `2. Re-run failed jobs if the issue is transient.`,
              `3. Commit a fix and push again if reproducible.`,
            ].join("\n");

            core.setOutput("title", title);
            core.setOutput("body", body);
            core.setOutput("pr_number", pr ? String(pr.number) : "");

      - name: Create failure issue
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ steps.summary.outputs.title }}
          ISSUE_BODY: ${{ steps.summary.outputs.body }}
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.create({
              owner,
              repo,
              title: process.env.ISSUE_TITLE,
              body: process.env.ISSUE_BODY,
            });

      - name: Comment on PR
        if: ${{ steps.summary.outputs.pr_number != '' }}
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ steps.summary.outputs.body }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = Number(`${{ steps.summary.outputs.pr_number }}`);
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: process.env.ISSUE_BODY,
            });
